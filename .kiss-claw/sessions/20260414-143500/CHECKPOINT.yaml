      \ deferred to Phase 3\n\n#### 8.3 **Idempotency Checks**\n- `backfill-checkpoint.sh`\
      \ prevents duplicate entries (grep -F checks agent+first line)\n- `store.sh\
      \ checkpoint upsert` uses awk state machine to update in place if claude_session\
      \ exists\n- Both protect against double-logging on re-runs\n\n#### 8.4 **Protected\
      \ File Ownership**\n- `guard.sh` enforces write ownership:\n  - PLAN.md, STATE.md\

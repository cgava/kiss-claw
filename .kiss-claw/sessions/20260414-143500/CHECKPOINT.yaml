      \n### 8. NON-OBVIOUS USAGE PATTERNS & CRITICAL RULES\n\n#### 8.1 **Session Propagation\
      \ (CRITICAL)**\n- Every delegation MUST pass `export KISS_CLAW_SESSION=<id>`\n\

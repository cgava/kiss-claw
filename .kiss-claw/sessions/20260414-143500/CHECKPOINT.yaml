      4. `search <terms>` -> `grep -rn -i` -- OK
      5. `list` -> iterates sections, finds non-index .md files -- OK
      6. Error handling: `die` function with stderr + exit 1 -- OK
      7. Pure bash, no external deps beyond standard tools (find, grep, sed, head) -- OK

      **Issues found:**

      1. The index.md lists pages that actually exist in the file tree -- verified above. All pages in the index correspond to actual files. Good.

      2. In `cmd_list` (line 124), the `title` extraction uses `grep -m1 '^# '` with `|| echo "$basename"` but due to how bash handles this in a pipeline, if `grep` returns nothing the `||` may not trigger as expected inside `$()`. Let me check more carefully.


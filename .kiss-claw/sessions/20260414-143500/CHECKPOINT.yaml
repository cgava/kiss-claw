      \ End-to-end integration tests\n\n---\n\n### 7. KEY USER-FACING FUNCTIONALITY\
      \ & USAGE PATTERNS\n\n#### 7.1 **Session Management (kiss-orchestrator)**\n\
      ```bash\n# List all sessions\n/kiss-orchestrator list\n\n# Resume a session\n\
      /kiss-orchestrator resume 20260414-082706\n\n# Create new session (implicit\
      \ on first call)\n/kiss-orchestrator\n# → INIT: 3 questions → session ID generated\
      \ → PLAN + STATE created → CHECKPOINT init-need\n```\n\n#### 7.2 **Persistence\
      \ Operations (/kiss-store)**\n```bash\n# Read\n/kiss-store read plan\n/kiss-store\
      \ read state\n/kiss-store read memory:kiss-executor\n\n# Write (overwrite)\n\
      /kiss-store write scratch \"## Notes\"\n\n# Append\n/kiss-store append reviews\
      \ \"- Step verified OK\"\n\n# Update a field\n/kiss-store update state current_step\
      \ \"Phase 1 / Step 2\"\n\n# Check existence\n/kiss-store exists checkpoint\n\
      \n# List all resources\n/kiss-store list\n```\n\n#### 7.3 **Checkpoint Operations**\n\
      ```bash\n# Initialize need section (kiss-orchestrator, after INIT)\necho 'why:\
      \ |\n  User wants faster API responses\n  Category: performance\nraw: |\n  \"\
      Optimize database queries\"\nelicited: |\n  Profile current bottleneck, add\
      \ indexes, cache layer\nconstraints: |\n  No major schema changes' | \\\nKISS_CLAW_SESSION=$session_id\
      \ bash scripts/store.sh checkpoint init-need\n\n# Log a task (kiss-executor,\
      \ after completing a task)\necho 'agent: kiss-executor\ntask: \"Implement caching\
      \ layer\"\nresult: \"Added Redis client, cache decorators on 3 endpoints, tests\
      \ passing\"' | \\\nKISS_CLAW_SESSION=$session_id bash scripts/store.sh checkpoint\
      \ upsert \"executor-$session_id\"\n\n# Log with parent (child delegation)\n\
      echo 'agent: kiss-executor\ntask: \"Write unit tests\"\nresult: \"20 tests,\
      \ all green\"' | \\\nKISS_CLAW_SESSION=$session_id bash scripts/store.sh checkpoint\
      \ upsert \"executor-child-$session_id\" \\\n  --parent \"orchestrator-$session_id\"\
      \n```\n\n#### 7.4 **Dry-Run Mode**\n```bash\n# Turn on\n/kiss-store update state\
      \ mode \"dry-run\"\n\n# kiss-executor output example\n[dry-run] Would write:\
      \ src/auth.py (42 lines)\n[dry-run] Would run: pytest tests/test_auth.py\n[dry-run]\

    Documentation structurée Diátaxis (tutorials, how-to, reference, explanation)
    dans docs/help/fr/ (i18n-ready). Skill kiss-help pour consultation par les agents.
    Intégration dans le workflow existant.
  constraints: |
    Français uniquement pour cette phase. Structure docs/help/fr/ pour permettre
    docs/help/en/ plus tard. Pas de refactoring du code. Tout dans le repo.


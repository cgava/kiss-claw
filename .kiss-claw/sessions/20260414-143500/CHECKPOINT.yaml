    task: |-
      ## Research: Diataxis Documentation Framework

      ### Findings

      **Source:** [Diátaxis](https://diataxis.fr/) (official site by Daniele Procida) | [Qiskit Sphinx Theme - Diataxis](https://qiskit.github.io/qiskit_sphinx_theme/intro/diataxis.html) | [Emmanuel Bernard - Exploring Diataxis](https://emmanuelbernard.com/blog/2024/12/19/diataxis/)

      ---

      ## The Two Axes

      Diataxis arranges documentation on two orthogonal axes:

      - **Practical vs. Theoretical** — Is the user doing something or understanding something?
      - **Acquisition vs. Application** — Is the user building new skills or applying existing ones?

      ---

      ## The Four Quadrants

      ### 1. Tutorials (Practical + Acquisition)
      **Definition:** A lesson that takes the student by the hand through a learning experience. Always practical; the user does something under instructor guidance.

      **Key principles:**
      - Hands-on, immersive — learning by doing, not by explaining
      - Designed for beginners starting from scratch
      - Builds confidence; ends with a sense of completion
      - Do not explain why; stay in the doing

      ### 2. How-to Guides (Practical + Application)
      **Definition:** A recipe for completing a real-world goal or task. Addresses an already-competent user who needs to get work done.

      **Key principles:**
      - Assumes baseline knowledge; skip the hand-holding
      - Action-focused, goal-oriented
      - Can present multiple approaches
      - Does not need to start from the beginning
      - Do not teach concepts; stay focused on the task

      ### 3. Reference (Theoretical + Application)
      **Definition:** Technical description of how the software works — facts a user needs to do things correctly. Accurate, complete, and free of interpretation.

      **Key principles:**
      - Describes, does not instruct
      - Mirrors the product structure (APIs, commands, flags, classes)
      - Austere and systematic — no opinion, no narrative
      - Supplemented by clarifying code examples
      - Consulted, not read cover-to-cover

      ### 4. Explanation (Theoretical + Acquisition)
      **Definition:** Contextual and conceptual material that improves understanding. Answers "why" questions; connects ideas.

      **Key principles:**
      - Discursive — may include background, rationale, design decisions
      - Explicitly labels opinions or tradeoffs
      - Connects the other three documentation types
      - Avoids procedural instruction
      - Ideal for architecture docs, design philosophy, concept overviews

      ---

      ## Structuring Documentation for a CLI/Tool

      1. **Separate the four types physically** — do not mix them in one page. A reference page should contain no tutorial steps; a how-to should not drift into explanation.
      2. **Start with a Tutorial** for new users — a single guided task that produces a real result.
      3. **How-to guides map to user goals** — one guide per discrete task (e.g., "How to configure authentication", "How to run in dry-run mode").
      4. **Reference mirrors the CLI surface** — one entry per command/flag/env var, structured uniformly.
      5. **Explanation covers architecture and rationale** — use for design decisions, agent roles, session lifecycle, etc.
      6. **Use the framework as a decision filter** — its greatest value is defining what to *exclude* from each document type, reducing duplication.
      7. **Iterate bottom-up** — Diataxis discourages big top-down documentation plans; make small responsive improvements from which overall patterns emerge.

      ---

      ### Version Notes

      Diataxis is an evolving living framework. The site (diataxis.fr) is the canonical reference. No version numbers apply — it is a conceptual framework, not a versioned spec.

      ### Additional Sources

      - [Diátaxis - Start Here (5-minute overview)](https://diataxis.fr/start-here/)
      - [Diátaxis Foundations](https://diataxis.fr/foundations/)
      - [Emmanuel Bernard - Exploring Diataxis (Dec 2024)](https://emmanuelbernard.com/blog/2024/12/19/diataxis/)
      - [Qiskit Sphinx Theme - Diataxis Reference](https://qiskit.github.io/qiskit_sphinx_theme/intro/diataxis.html)
      - [Ubuntu - Diataxis as new foundation for Canonical docs](https://ubuntu.com/blog/diataxis-a-new-foundation-for-canonical-documentation)

      ### Recommended Next Step

      For kiss-claw specifically: map the existing `docs/` or `README` content against the four quadrants, identify which type each section belongs to, then split or label accordingly. The agent YAML files are closest to Reference; the `CLAUDE.md` mixes Explanation and Reference and could be split into a separate architecture/concepts doc.

      Sources:
      - [Diátaxis](https://diataxis.fr/)
      - [The Diátaxis Framework - Qiskit Docs Guide](https://qiskit.github.io/qiskit_sphinx_theme/intro/diataxis.html)
      - [Exploring Diataxis - Emmanuel Bernard](https://emmanuelbernard.com/blog/2024/12/19/diataxis/)
      - [Start here - Diátaxis in five minutes](https://diataxis.fr/start-here/)
      - [Ubuntu - Diátaxis, a new foundation for Canonical documentation](https://ubuntu.com/blog/diataxis-a-new-foundation-for-canonical-documentation)

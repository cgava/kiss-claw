      \ state mode \"dry-run\"` or `\"live\"`\n\n#### 8.8 **CHECKPOINT YAML Structure**\n\
      ```yaml\nsession: \"20260414-082706\"\ncreated: \"2026-04-14T08:27:06\"\n\n\

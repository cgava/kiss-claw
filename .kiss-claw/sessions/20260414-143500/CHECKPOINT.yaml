      \ (via /kiss-store)\n  - REVIEWS.md → only kiss-verificator (via /kiss-store)\n\
      \  - INSIGHTS.md, ANALYZED.md → only kiss-improver (via /kiss-store)\n  - MEMORY_kiss-*.md\
      \ → owning agent only (via /kiss-store)\n  - MEMORY.md → only kiss-improver\
      \ (via /kiss-store)\n- Exception: store.sh itself allowed (whitelist in guard.sh)\n\
      \n#### 8.5 **INIT Mandatory Even with Full Context**\n- INIT asks 3 questions\
      \ explicitly for alignment, not just information\n- If user provides answers\
      \ in initial message, confirm explicitly\n- \"You said you're building X — correct,\
      \ or should I adjust?\"\n- Never skip INIT and produce plan directly\n\n####\
      \ 8.6 **Memory Management**\n- Keep state <80 lines (archive old log entries\
      \ to scratch)\n- Keep memory:kiss-orchestrator <60 lines (merge similar entries)\n\
      - Keep memory:kiss-improver <60 lines (high-signal friction only)\n- Analyzed\

  why: |
    Dette documentaire — le projet kiss-claw a évolué rapidement (checkpoint,
    sync-sessions, store.sh enrichi, multi-session) mais la documentation
    n a pas suivi. Les process ne sont pas évidents pour les utilisateurs
    ni pour les agents.
    Catégorie : dette_technique
  raw: |
    De nombreuses fonctionnalités ont été ajoutées, l usage de kiss-orchestrator
    commence à se complexifier (notamment les dernières fonctionnalités, de
    sauvegardes de CHECKPOINT sans les hooks, ou aller synchroniser les sessions
    claude sans que ça soit automatique). Générer une documentation en utilisant
    le pattern Diátaxis, parcourable par les agents via un skill kiss-help.

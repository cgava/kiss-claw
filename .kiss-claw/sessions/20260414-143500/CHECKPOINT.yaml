      But line 125 adds: `[[ -z "$title" ]] && title="$basename"` -- This is a safety net for when grep finds `# ` but after sed it becomes empty. Good, belt and suspenders.

      3. In `cmd_search` (line 98): `grep -rn -i "$terms"` -- the terms are passed directly to grep pattern. If user searches for terms containing regex special chars, this could fail or give wrong results. This is a minor issue (not blocking for an internal doc tool).

      4. The `explanation` column in kiss-help.md's table (line 30) has an extra space before `|` compared to other rows, causing slight misalignment. Very minor visual issue in the markdown table.


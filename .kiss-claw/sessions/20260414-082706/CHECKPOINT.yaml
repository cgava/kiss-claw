      The issue is that the update awk's indent detection. When the entry is a child (indented), the `claude_session:` line has indent like `        ` (8 spaces). The next field `timestamp:` also has 8 spaces. But then `children: []` at indent 8 is followed by `      - agent:` (6 spaces) for the next sibling -- which has less indent. So it exits before reaching `result`. Actually wait, looking at the structure:

      ```
            - agent: "kiss-executor"          <- 6 spaces + "-"
              claude_session: "sess-002"      <- 8 spaces
              timestamp: ...                  <- 8 spaces
              task: ...                       <- 8 spaces
              result: "Done"                  <- 8 spaces
              children: []                    <- 8 spaces
      ```

      The awk matches `claude_session: "sess-002"` at indent 8. Then it looks for lines with indent <= 8 that match `(-|[a-z])`. The next line `timestamp:` has indent 8 and matches `[a-z]` -- so it exits immediately. That's the bug.

      The exit condition should be: indent **strictly less** than the entry's indent, or a new list item at the same level.


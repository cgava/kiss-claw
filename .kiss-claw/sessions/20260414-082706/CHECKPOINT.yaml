need:
  why: |
    Dette technique — les hooks sont cassés (ISSUE-005), le CHECKPOINT.md
    existant est un format plat sans traçabilité. Impossible de relier les
    étapes du plan aux sessions Claude réelles. Le journal projet (SESSIONS.json)
    ne conserve aucun résumé de ce qui a été fait.
    Catégorie : dette_technique
  raw: |
    Deux évolutions des agents kiss-claw :

    1. L agent Orchestrator doit initialiser le CHECKPOINT avec le récapitulatif
       précis du besoin utilisateur : le besoin tel que décrit par l utilisateur,
       plus les intentions élicitées par l agent (en mode autonome ou via des
       questions à l utilisateur).

    2. Les hooks du projet sont désactivés (non-fonctionnels, ISSUE-005).
       Workaround proposé : l orchestrator ajoute un suivi au cours du plan,
       et demande à chaque agent délégué d y inscrire également son suivi
       (ce qui a été demandé, et ce qui a été fait).

    3. Le fichier CHECKPOINT passe au format YAML (pas JSON), session-scoped,
       pour combiner hiérarchie et descriptions multi-lignes lisibles.

    4. SESSIONS.json doit être enrichi pour devenir un journal des évolutions
       du projet (vision grosse maille). À la fin d une session (ou sur demande),
       une synthèse du CHECKPOINT est ajoutée à SESSIONS.json : besoin d origine,
       modifications effectuées, décisions, fichiers changés, follow-ups.

    5. Le CHECKPOINT doit conserver les identifiants de sessions Claude
       (présents dans ~/.claude/projects/) pour chaque appel d agent et de
       sub-agent. Chaîne de traçabilité complète :
       SESSIONS.json → CHECKPOINT.yaml → sessions Claude.

    6. Un script shell (scripts/sync-sessions.sh) doit permettre de récupérer
       les sessions + sub-agent sessions depuis .claude/projects, avec rsync,
       et proposer de nettoyer les sessions sources (--clean).
  elicited: |
    - Le CHECKPOINT.yaml est session-scoped, stocké dans .kiss-claw/sessions/<id>/
    - Descriptions quasi-verbatim (pas de résumé appauvri)
    - Structure hiérarchique (agent → children sub-agents)
    - Section "need" détachée du log
    - store.sh gère toutes les écritures CHECKPOINT : upsert par claude_session
    - Phase de transition : backfill-checkpoint.sh comme workaround temporaire
  constraints: |
    - Pas toucher aux hooks (cassés, hors scope — ISSUE-005)
    - Shell pur, zéro dépendance externe
    - Format YAML pour lisibilité multi-ligne
    - Descriptions verbatim (pas de résumé)
    - store.sh = seul point d écriture CHECKPOINT

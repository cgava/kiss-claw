need:
  why: |
    Raison profonde : Les tests des agents kiss-claw tournent sur le host, donc les résultats peuvent être pollués par les plugins, hooks, MCP et CLAUDE.md de l environnement de dev. On veut garantir que les agents testés (SUT) s exécutent dans un environnement Docker vierge pour des résultats fiables.
    Catégorie : feature
  raw: |
    Faire tourner les agents testés dans un conteneur Docker vierge via my-claude-minion.
    Le test runner reste sur le host pour bénéficier du contexte de dev.
    L auth OAuth du host est montée en read-only dans le conteneur.
  elicited: |
    - Agent testé (SUT) → Docker (environnement vierge, zéro pollution)
    - Agent testant (test runner) → Host (bénéficie du contexte dev, plugins, MCP)
    - my-claude-minion fournit déjà l image Docker avec isolation
    - Contrainte forte : aucun plugin/hook/MCP du host ne doit fuir dans le conteneur
  constraints: |
    - Ne pas modifier my-claude-minion (consommer son Docker tel quel)
    - Ne pas faire tourner le test runner dans Docker
    - Zéro dépendance externe supplémentaire


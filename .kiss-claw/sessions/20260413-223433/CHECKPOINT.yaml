          .kiss-claw/                              <- KISS_CLAW_DIR
            VERSION                                <- "7"
            agents/                                <- KISS_CLAW_AGENTS_DIR
              MEMORY_kiss-orchestrator.md
              MEMORY_kiss-executor.md
              MEMORY_kiss-verificator.md
              MEMORY_kiss-improver.md
              INSIGHTS.md
              ANALYZED.md
            project/                               <- KISS_CLAW_PROJECT_DIR
              MEMORY.md
              ISSUES.md
              SESSIONS.json
            sessions/                              <- KISS_CLAW_SESSIONS_DIR
              20260413-153022/
                PLAN.md, STATE.md, REVIEWS.md, SCRATCH.md, CHECKPOINT.md
          ```

          ### Resource Mapping Table

          | Variable | Default | Description |
          |----------|---------|-------------|
          | KISS_CLAW_DIR | .kiss-claw | Root |
          | KISS_CLAW_AGENTS_DIR | $KISS_CLAW_DIR/agents | Agent memories |
          | KISS_CLAW_PROJECT_DIR | $KISS_CLAW_DIR/project | Project data |
          | KISS_CLAW_SESSIONS_DIR | $KISS_CLAW_DIR/sessions | Session folders |
          | KISS_CLAW_SESSION | (none -- required at runtime) | Active session |

          ### Key Decisions

          - TOKEN_STATS.md disabled, added to ISSUES (ISSUE-006)
          - New session = folder YYYYMMDD-HHmmss, renameable via mv
          - kiss-orchestrator: list (sessions), resume <id> (reload), empty (new)
          - project/SESSIONS.json: index with id/created/status/title
          - Variables d'env (not config.yaml) for path configuration
          - Symlink support via init.sh interactive dialogue


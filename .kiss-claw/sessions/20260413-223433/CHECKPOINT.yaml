need:
  why: |
    En mode dev, kiss-claw partage un seul répertoire .kiss-claw/ entre
    le projet hôte et le plugin lui-même. La structure plate (tous les
    fichiers au même niveau) crée des conflits et empêche le multi-session.
    Catégorie : dette_technique
  raw: |
    J ai un problème quand j utilise kiss-claw en mode dev pour d autres
    projets : les fichiers d état se mélangent. Il faut restructurer
    .kiss-claw/ en sous-dossiers (agents, project, sessions) avec chemins
    configurables via variables d environnement, symlinks possibles, et
    support multi-session.
  elicited: |
    Restructuration complète de .kiss-claw/ en 3 tiers :
    - agents/ (mémoires agents, insights, analyzed)
    - project/ (mémoire partagée, issues, sessions.json)
    - sessions/ (plan, state, reviews, scratch, checkpoint par session)
    Chemins configurables via KISS_CLAW_AGENTS_DIR, KISS_CLAW_PROJECT_DIR,
    KISS_CLAW_SESSIONS_DIR. Support symlinks. Multi-session avec ID YYYYMMDD-HHmmss.
  constraints: |
    - Zéro dépendance externe (shell pur)
    - Rétrocompatible avec v6 (migration automatique)
    - store.sh reste le seul point d accès persistance

